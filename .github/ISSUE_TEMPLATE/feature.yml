name: Feature request
description: Suggest a new feature, an improvement, or a behaviour change
title: '[feature] '
labels: ['feature', 'backlog', 'user-submitted']
body:
  - type: markdown
    attributes:
      value: |
        Before opening a feature request:

        - This repository maintains the StartOS package and downstream
          integration. General application behavior requests may belong
          upstream at `rdouma/hashrate-autopilot`.
        - For open-ended questions ("could it support X?", "would it
          make sense to do Y?"), [Discussions](https://github.com/mdubore/hashrate9/discussions)
          is usually a better fit than an issue.
        - The application is scoped to non-custodial mining via
          Datum-compatible pools, with Braiins as the first hashpower
          marketplace. Other markets, pools, or use cases need a clear
          operator-focused case.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve for you?
      description: |
        The thing you're trying to do today that this would make
        easier or possible. "I'd like X" is OK; "I'm trying to do Y
        and I keep running into Z" is much better.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed behaviour
      description: |
        What would you like to see happen? UI sketches, sample log
        lines, mock CHANGELOG entries are all welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: |
        Other ways you could solve this (existing config knobs, a
        downstream script, a different tool). Helps me understand
        whether the right answer is "yes, build it" vs "here's a
        different way."

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: |
        Links to related issues, prior-art tools, screenshots, etc.
