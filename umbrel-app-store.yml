# Preserved upstream Umbrel Community App Store manifest. The StartOS
# package in this fork does not use this file, but it remains at the
# repository root because Umbrel's "Add App Store" flow expects it
# there when targeting the upstream app store layout.
#
# Operators add this store to their Umbrel via:
#   Settings → App Stores → Add App Store
#   → https://github.com/rdouma/hashrate-autopilot
# Umbrel then walks each top-level directory of the upstream repo
# looking for umbrel-app.yml manifests. This fork keeps that metadata
# under rdouma-hashrate-autopilot/.
#
# When the official Umbrel store accepts a submission of the same
# manifest, this Community Store entry can be deprecated in favour
# of the official one.

id: rdouma
# Umbrel renders this as "<name> App Store" - so this becomes
# "Hashrate Autopilot App Store".
name: Hashrate Autopilot
tagline: Decentralized hashrate automation for Bitcoin mining
